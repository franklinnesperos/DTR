<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar Monitor Pro</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: white; font-family: "Segoe UI", sans-serif; text-align: center; }
        .header { padding: 20px; background: #1a1a1a; display: flex; align-items: center; justify-content: space-between; }
        .back-btn { text-decoration: none; color: white; font-size: 20px; }
        
        .dashboard { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: #151515; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .card h3 { font-size: 12px; color: #888; margin: 0; text-transform: uppercase; }
        .card .value { font-size: 24px; font-weight: bold; color: #ffcc00; margin: 10px 0; }
        
        /* Flow Animation Area */
        .flow-container { margin: 20px 0; padding: 20px; position: relative; height: 200px; }
        .circle { width: 60px; height: 60px; border-radius: 50%; background: #222; display: flex; align-items: center; justify-content: center; font-size: 25px; position: absolute; border: 2px solid #444; }
        
        .panel { top: 0; left: 50%; transform: translateX(-50%); border-color: #ffcc00; }
        .battery { bottom: 0; left: 0; border-color: #00ff00; }
        .load { bottom: 0; right: 0; border-color: #00b2ff; }

        .line { position: absolute; background: #333; z-index: -1; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">⬅</a>
        <span>Solar Hybrid Monitor</span>
        <span style="color: #00ff00; font-size: 10px;">● LIVE</span>
    </div>

    <div class="dashboard">
        <div class="card">
            <h3>Solar Input</h3>
            <div class="value" id="solar-w">1500W</div>
        </div>
        <div class="card">
            <h3>Battery</h3>
            <div class="value" id="batt-v">52.4V</div>
            <small id="batt-p">98%</small>
        </div>
        <div class="card">
            <h3>Load Power</h3>
            <div class="value" id="load-w">450W</div>
        </div>
        <div class="card">
            <h3>Grid Status</h3>
            <div class="value" style="color: #666;">OFF</div>
        </div>
    </div>

    <div class="flow-container">
        <div class="circle panel">☀️</div>
        <div class="circle battery">🔋</div>
        <div class="circle load">🏠</div>
        <p style="margin-top: 80px; font-size: 12px; color: #555;">Energy Flow Active</p>
    </div>

    <div style="padding: 20px;">
        <button onclick="simulate()" style="background: #333; color: white; border: none; padding: 10px 20px; border-radius: 10px;">Refresh Data</button>
    </div>

    <script>
        function simulate() {
            // Random values para magmukhang totoong monitor
            const solar = Math.floor(Math.random() * (3200 - 1500 + 1)) + 1500;
            const load = Math.floor(Math.random() * 800) + 100;
            const battV = (Math.random() * (54 - 48) + 48).toFixed(1);
            const battP = Math.floor(((battV - 48) / 6) * 100);

            document.getElementById('solar-w').innerText = solar + "W";
            document.getElementById('load-w').innerText = load + "W";
            document.getElementById('batt-v').innerText = battV + "V";
            document.getElementById('batt-p').innerText = (battP > 100 ? 100 : battP) + "%";
        }
        
        // Auto update every 3 seconds
        setInterval(simulate, 3000);
    </script>
</body>
</html>
