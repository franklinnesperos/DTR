<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S25 Smart CCTV</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; }
        .header { padding: 15px; background: #111; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .back-btn { text-decoration: none; color: white; font-size: 20px; }
        
        /* CCTV Grid */
        .cctv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; background: #333; padding: 2px; }
        .cam-box { position: relative; background: #111; height: 180px; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        /* Static effect for realism */
        .cam-box::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.03); pointer-events: none; }
        
        .cam-label { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.6); padding: 2px 5px; font-size: 10px; border-radius: 3px; z-index: 10; }
        .rec-dot { position: absolute; top: 5px; right: 5px; color: red; font-size: 10px; animation: blink 1s infinite; z-index: 10; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        
        .timestamp { position: absolute; bottom: 5px; right: 5px; font-size: 10px; font-family: monospace; }
        
        /* Controls */
        .controls { padding: 20px; display: flex; justify-content: space-around; background: #111; margin-top: 10px; }
        .btn { background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 10px; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">⬅</a>
        <span style="font-weight: bold;">Smart Security</span>
        <span style="color: #4ade80; font-size: 12px;">ONLINE</span>
    </div>

    <div class="cctv-grid">
        <div class="cam-box">
            <div class="cam-label">CAM 01 - GATE</div>
            <div class="rec-dot">● REC</div>
            <img src="https://images.unsplash.com/photo-1558036117-15d82a90b9b1?auto=format&fit=crop&w=400" style="width:100%; height:100%; object-fit:cover; opacity: 0.7;">
            <div class="timestamp" id="t1"></div>
        </div>
        <div class="cam-box">
            <div class="cam-label">CAM 02 - LIVING</div>
            <img src="https://images.unsplash.com/photo-1585127659132-67a7c2e42677?auto=format&fit=crop&w=400" style="width:100%; height:100%; object-fit:cover; opacity: 0.7;">
            <div class="timestamp" id="t2"></div>
        </div>
        <div class="cam-box">
            <div class="cam-label">CAM 03 - KITCHEN</div>
            <img src="https://images.unsplash.com/photo-1556911220-e15b29be8c8f?auto=format&fit=crop&w=400" style="width:100%; height:100%; object-fit:cover; opacity: 0.7;">
            <div class="timestamp" id="t3"></div>
        </div>
        <div class="cam-box">
            <div class="cam-label">CAM 04 - BACKYARD</div>
            <img src="https://images.unsplash.com/photo-1590059393043-f61536968851?auto=format&fit=crop&w=400" style="width:100%; height:100%; object-fit:cover; opacity: 0.7;">
            <div class="timestamp" id="t4"></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn">📸 Snapshot</button>
        <button class="btn">🎤 Speak</button>
        <button class="btn">🚨 Alarm</button>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleString('en-GB');
            for(let i=1; i<=4; i++) {
                document.getElementById('t'+i).innerText = timeStr;
            }
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
