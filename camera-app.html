<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S25 Ultra Camera</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        video { width: 100vw; height: 100vh; object-fit: cover; }
        .ui { position: absolute; bottom: 0; width: 100%; height: 150px; background: rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; gap: 40px; }
        .shutter { width: 70px; height: 70px; background: white; border-radius: 50%; border: 5px solid rgba(255,255,255,0.3); }
        .exit { position: absolute; top: 20px; left: 20px; color: white; text-decoration: none; font-size: 24px; background: rgba(0,0,0,0.5); width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; border-radius: 50%; }
    </style>
</head>
<body>
    <a href="index.html" class="exit">✕</a>
    <video id="cam" autoplay playsinline></video>
    <div class="ui">
        <div style="width:40px; height:40px; border:2px solid white; border-radius:5px;"></div>
        <div class="shutter"></div>
        <div style="font-size:30px; color:white;">🔄</div>
    </div>
    <script>
        const v = document.getElementById('cam');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(s => { v.srcObject = s; })
            .catch(e => { alert("Check camera permissions"); });
    </script>
</body>
</html>
