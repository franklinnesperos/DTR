<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Franklin DTR - Fortnightly</title>
    <style>
        /* --- SCREEN VIEW: Para sa madaling pag-input sa phone --- */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 15px; color: #333; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1976D2; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Tables stacked vertically on screen */
        .tables-wrapper { display: flex; flex-direction: column; gap: 30px; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: center; }
        th { background-color: #1976D2; color: white; font-weight: 600; text-transform: uppercase; font-size: 13px; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        
        input { width: 95%; border: 1px solid transparent; text-align: center; font-size: 15px; padding: 5px; transition: 0.3s; }
        input:focus { border-bottom: 1px solid #1976D2; outline: none; background: #e3f2fd; }
        
        .btn-container { text-align: center; margin-top: 30px; }
        button { padding: 12px 30px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; color: white; background-color: #27ae60; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s; }
        button:active { transform: translateY(2px); box-shadow: none; }

        /* --- PRINT VIEW: Magic para sa Single Page Landscape PDF --- */
        @media print {
            @page { size: landscape; margin: 8mm; }
            body { background: white; padding: 0; }
            .container { max-width: 100% !important; box-shadow: none; padding: 0; margin: 0; }
            h2 { font-size: 18px; margin-bottom: 15px; }
            
            /* Pilitin magtabi ang tables sa PDF */
            .tables-wrapper { flex-direction: row !important; gap: 15px; }
            table { width: 49% !important; font-size: 11px; }
            th, td { padding: 8px !important; }
            
            /* Tago ang buttons at inputs border */
            .btn-container, .no-print { display: none !important; }
            input { border: none !important; width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>DTR Fortnightly: Week 1 & 2</h2>

    <div class="tables-wrapper">
        <!-- WEEK 1 -->
        <table>
            <thead>
                <tr><th colspan="3">WEEK 1</th></tr>
                <tr><th width="20%">Day</th><th width="20%">Hours</th><th>Site / Work Details</th></tr>
            </thead>
            <tbody>
                <tr><td>Mon</td><td><input type="number" value="8"></td><td><input type="text" placeholder="Job details..."></td></tr>
                <tr><td>Tue</td><td><input type="number" value="8"></td><td><input type="text" placeholder="..."></td></tr>
                <tr><td>Wed</td><td><input type="number" value="8"></td><td><input type="text" placeholder="..."></td></tr>
                <tr><td>Thu</td><td><input type="number" value="8"></td><td><input type="text" placeholder="..."></td></tr>
                <tr><td>Fri</td><td><input type="number" value="8"></td><td><input type="text" placeholder="..."></td></tr>
                <tr><td>Sat</td><td><input type="number" value="0"></td><td><input type="text"></td></tr>
                <tr><td>Sun</td><td><input type="number" value="0"></td><td><input type="text"></td></tr>
            </tbody>
        </table>

        <!-- WEEK 2 -->
        <table>
            <thead>
                <tr><th colspan="3" style="background-color: #1565C0;">WEEK 2</th></tr>
                <tr><th width="20%">Day</th><th width="20%">Hours</th><th>Site / Work Details</th></tr>
            </thead>
            <tbody>
                <tr><td>Mon</td><td><input type="number" value="8"></td><td><input type="text" placeholder="Job details..."></td></tr>
                <tr><td>Tue</td><td><input type="number" value="8"></td><td><input type="text" placeholder="..."></td></tr>
                <tr><td>Wed</td><td><input type="number" value="8"></td><td><input type="text" placeholder="..."></td></tr>
                <tr><td>Thu</td><td><input type="number" value="8"></td><td><input type="text" placeholder="..."></td></tr>
                <tr><td>Fri</td><td><input type="number" value="9"></td><td><input type="text" placeholder="Finalized site"></td></tr>
                <tr><td>Sat</td><td><input type="number" value="0"></td><td><input type="text"></td></tr>
                <tr><td>Sun</td><td><input type="number" value="0"></td><td><input type="text"></td></tr>
            </tbody>
        </table>
    </div>

    <div class="btn-container no-print">
        <button onclick="window.print()">SAVE AS PDF (Landscape)</button>
    </div>
</div>

</body>
</html>
