<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrankOS</title>
    <style>
        body { background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .phone-frame { width: 330px; height: 680px; background: #000; border: 10px solid #333; border-radius: 45px; position: relative; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .screen { width: 100%; height: 100%; background: linear-gradient(180deg, #2c3e50 0%, #000000 100%); padding: 60px 20px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; box-sizing: border-box; }
        .app-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .icon { width: 55px; height: 55px; background: white; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 30px; margin-bottom: 5px; box-shadow: 0 5px 10px rgba(0,0,0,0.3); }
        .label { color: white; font-size: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="screen">
            <a href="dtr-app.html" class="app-item">
                <div class="icon" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">📅</div>
                <span class="label">DTR Frank</span>
            </a>
            <div class="app-item" onclick="alert('Soon!')">
                <div class="icon" style="background: #e0e0e0;">➕</div>
                <span class="label">Add App</span>
            </div>
        </div>
    </div>
</body>
</html>
