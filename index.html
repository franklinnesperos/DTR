<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frank S25 Ultra Pro</title>
    <style>
        body { background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: "Segoe UI", sans-serif; overflow: hidden; touch-action: none; }
        .phone-frame { width: 360px; height: 740px; background: #000; border: 4px solid #333; border-radius: 35px; position: relative; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .camera-hole { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 12px; height: 12px; background: #0a0a0a; border-radius: 50%; z-index: 5000; }
        .screen { width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000'); background-size: cover; background-position: center; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; position: relative; }
        .status-bar { width: 100%; display: flex; justify-content: space-between; padding: 12px 20px; color: white; font-size: 13px; font-weight: 600; z-index: 500; position: absolute; top: 0; box-sizing: border-box; }
        
        /* Clock */
        .main-clock { margin-top: 60px; color: white; text-align: center; width: 100%; cursor: pointer; z-index: 10; }
        #big-time { font-size: 72px; font-weight: 200; margin: 0; }
        #big-date { font-size: 16px; margin-top: -5px; opacity: 0.9; }

        /* Apps */
        .app-grid { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: auto; margin-bottom: 50px; z-index: 10; }
        .app-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .icon { width: 58px; height: 58px; border-radius: 18px; display: flex; justify-content: center; align-items: center; font-size: 30px; margin-bottom: 6px; }
        .label { color: white; font-size: 11px; text-shadow: 1px 1px 3px #000; }

        /* TAPO LIVE INTERFACE */
        #tapoApp { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f4f4f4; z-index: 4000; display: none; flex-direction: column; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .tapo-header { background: white; padding: 45px 20px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; color: #00a0e9; font-weight: bold; }
        .close-btn { cursor: pointer; font-size: 24px; padding: 5px; }

        .tapo-content { padding: 10px; flex: 1; overflow-y: auto; }
        .live-cam { width: 100%; height: 200px; background: #000; border-radius: 12px; margin-bottom: 15px; position: relative; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        /* Para sa Live Video feel */
        .live-cam video, .live-cam iframe { width: 100%; height: 100%; border: none; object-fit: cover; }
        .live-tag { position: absolute; top: 10px; left: 10px; background: rgba(255, 0, 0, 0.8); color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; animation: blink 1s infinite; z-index: 10; }
        @keyframes blink { 50% { opacity: 0.3; } }
        
        .cam-name { position: absolute; bottom: 10px; left: 10px; color: white; font-size: 12px; text-shadow: 1px 1px 3px #000; z-index: 10; }
    </style>
</head>
<body>

    <div class="phone-frame">
        <div class="camera-hole"></div>
        <div class="status-bar">
            <span id="status-time">00:00</span>
            <div>100% 🔋</div>
        </div>

        <div class="screen">
            <div class="main-clock" onclick="goTo('clock-app.html')">
                <h1 id="big-time">00:00</h1>
                <p id="big-date">Date Loading...</p>
            </div>

            <div class="app-grid">
                <div class="app-item" onclick="goTo('dtr-app.html')">
                    <div class="icon" style="background: white;">📅</div>
                    <span class="label">DTR</span>
                </div>
                <div class="app-item" onclick="goTo('solar-app.html')">
                    <div class="icon" style="background: linear-gradient(135deg, #FF8C00, #FFD700);">☀️</div>
                    <span class="label">Solar</span>
                </div>
                <div class="app-item" onclick="openTapo()">
                    <div class="icon" style="background: #00a0e9;">📹</div>
                    <span class="label">Tapo</span>
                </div>
                <div class="app-item" onclick="goTo('messenger-app.html')">
                    <div class="icon" style="background: linear-gradient(135deg, #00B2FF, #006AFF);">💬</div>
                    <span class="label">Chat</span>
                </div>
            </div>

            <div id="tapoApp">
                <div class="tapo-header">
                    <span>Tapo Smart (Live)</span>
                    <span class="close-btn" onclick="closeTapo()">✕</span>
                </div>
                <div class="tapo-content">
                    <div class="live-cam">
                        <div class="live-tag">● LIVE</div>
                        <div class="cam-name">GATE CAMERA - HAMILTON</div>
                        <video autoplay muted loop playsinline>
                            <source src="https://assets.mixkit.co/videos/preview/mixkit-security-camera-view-of-a-street-at-night-34440-large.mp4" type="video/mp4">
                        </video>
                    </div>

                    <div class="live-cam">
                        <div class="live-tag">● LIVE</div>
                        <div class="cam-name">LIVING ROOM</div>
                        <video autoplay muted loop playsinline>
                            <source src="https://assets.mixkit.co/videos/preview/mixkit-cctv-camera-of-a-room-with-people-34442-large.mp4" type="video/mp4">
                        </video>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function goTo(url) { window.location.href = url; }
        
        function openTapo() { 
            const app = document.getElementById('tapoApp');
            app.style.display = 'flex';
            // Play videos on open
            const videos = app.querySelectorAll('video');
            videos.forEach(v => v.play());
        }
        
        function closeTapo() { document.getElementById('tapoApp').style.display = 'none'; }

        function updateClock() {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            document.getElementById('status-time').textContent = time;
            document.getElementById('big-time').textContent = time;
            document.getElementById('big-date').textContent = now.toLocaleDateString('en-PH', { weekday: 'long', month: 'long', day: 'numeric' });
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
