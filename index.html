<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JP INTERIORS LIMITED - DTR</title>
    <style>
        :root { --dark-blue: #001f3f; --sat-blue: #e3f2fd; --sun-red: #ffebee; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f4; padding: 10px; margin: 0; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        
        .branding { text-align: center; margin-bottom: 20px; }
        .branding h1 { color: var(--dark-blue); margin: 0; font-size: 28px; text-transform: uppercase; }
        .branding p { margin: 0; font-weight: bold; color: #555; }

        .header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; }
        .field label { font-weight: bold; font-size: 11px; color: #666; margin-bottom: 3px; }
        select, input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        th { background: var(--dark-blue); color: white; border: 1px solid #ddd; padding: 8px; font-size: 11px; }
        td { border: 1px solid #ddd; padding: 2px; text-align: center; }
        
        /* Highlights */
        .sat-row { background-color: var(--sat-blue) !important; }
        .sun-row { background-color: var(--sun-red) !important; }
        .week-spacer { height: 20px; background: #eee; }

        .time-select { width: 100%; border: none; background: transparent; font-size: 12px; height: 30px; }
        input.site-input { width: 95%; border: none; background: transparent; font-size: 12px; text-align: left; }

        /* Signature Modal */
        #sig-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; justify-content:center; align-items:center; touch-action: none; }
        .modal-content { background:white; padding:20px; border-radius:10px; width: 90%; max-width: 500px; text-align:center; }
        #sig-canvas { border: 2px dashed #000; background:#fff; touch-action: none; width: 100%; max-width: 400px; height: 200px; }

        .buttons { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
        .btn { padding: 12px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; }
        .btn-save { background: #27ae60; }
        .btn-print { background: var(--dark-blue); }
        .btn-clear { background: #7f8c8d; }

        @media print {
            .no-print, .btn, #sig-modal { display: none !important; }
            .container { box-shadow: none; padding: 0; }
            select { -webkit-appearance: none; appearance: none; border: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="branding">
        <h1>JP INTERIORS</h1>
        <p>LIMITED</p>
    </div>

    <div class="header-grid">
        <div class="field">
            <label>NAME:</label>
            <select id="userName" onchange="saveAll()">
                <option value="FRANKLIN NESPEROS">FRANKLIN NESPEROS</option>
                <option value="ELMER CABAÑA">ELMER CABAÑA</option>
                <option value="LARRY LABRADOR">LARRY LABRADOR</option>
            </select>
        </div>
        <div class="field"><label>DATE START:</label><input type="date" id="dateStart" onchange="updateTable()"></div>
        <div class="field"><label>POSITION:</label><input type="text" value="Plasterer" readonly></div>
        <div class="field"><label>PERIOD ENDING:</label><input type="text" id="dateEnd" readonly></div>
    </div>

    <table>
        <thead>
            <tr>
                <th width="18%">DAY & DATE</th>
                <th width="15%">START</th>
                <th width="15%">FINISH</th>
                <th width="10%">NO BREAK</th>
                <th width="10%">TOTAL</th>
                <th>SITE / COMMENTS</th>
            </tr>
        </thead>
        <tbody id="dtrBody"></tbody>
    </table>

    <div style="margin-top:20px;">
        <label style="font-weight:bold;">SIGNATURE:</label>
        <div id="sig-display" onclick="openSig()" style="border-bottom:2px solid #000; width:250px; height:60px; background:#fafafa; display:flex; align-items:center; justify-content:center; cursor:pointer;">
            Click to Sign Here
        </div>
    </div>

    <div class="buttons no-print">
        <button class="btn btn-save" onclick="saveAll()">SAVE DATA</button>
        <button class="btn btn-print" onclick="window.print()">PRINT PDF</button>
    </div>
</div>

<div id="sig-modal">
    <div class="modal-content">
        <h3>Sign with your finger</h3>
        <canvas id="sig-canvas"></canvas><br><br>
        <button class="btn btn-clear" onclick="clearSig()">Clear</button>
        <button class="btn btn-save" onclick="saveSig()">Confirm</button>
        <button class="btn btn-clear" style="background:#e74c3c" onclick="closeSig()">Close</button>
    </div>
</div>

<script>
    const dtrBody = document.getElementById('dtrBody');
    const daysArr = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];

    function createTimeOptions() {
        let options = '<option value="">--:--</option>';
        for (let h = 6; h <= 22; h++) {
            let hour = h > 12 ? h - 12 : h;
            let ampm = h >= 12 ? "PM" : "AM";
            for (let m of ["00", "15", "30", "45"]) {
                let time = `${hour}:${m} ${ampm}`;
                options += `<option value="${time}">${time}</option>`;
            }
        }
        return options;
    }

    function updateTable() {
        const start = document.getElementById('dateStart').value;
        if (!start) return;
        
        let startDate = new Date(start);
        let endDate = new Date(start);
        endDate.setDate(startDate.getDate() + 13);
        document.getElementById('dateEnd').value = endDate.toDateString();

        dtrBody.innerHTML = "";
        const timeOpts = createTimeOptions();

        for (let i = 0; i < 14; i++) {
            if (i === 7) dtrBody.innerHTML += `<tr class="week-spacer"><td colspan="6"></td></tr>`;
            
            let curr = new Date(start);
            curr.setDate(startDate.getDate() + i);
            let dayName = daysArr[curr.getDay() === 0 ? 6 : curr.getDay() - 1];
            let rowClass = dayName === "Saturday" ? "sat-row" : (dayName === "Sunday" ? "sun-row" : "");

            // Tatlong Row kada araw
            for (let r = 0; r < 3; r++) {
                dtrBody.innerHTML += `
                    <tr class="${rowClass}">
                        <td>${r === 0 ? `<b>${dayName} ${curr.getDate()}</b>` : ""}</td>
                        <td><select class="time-select" id="s-${i}-${r}">${timeOpts}</select></td>
                        <td><select class="time-select" id="f-${i}-${r}">${timeOpts}</select></td>
                        <td><input type="checkbox" id="b-${i}-${r}"></td>
                        <td id="t-${i}-${r}">0.0</td>
                        <td><input type="text" class="site-input" id="site-${i}-${r}" placeholder="..."></td>
                    </tr>
                `;
            }
        }
        loadAll();
    }

    // Signature Logic (With Touch Support)
    const canvas = document.getElementById('sig-canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function openSig() { document.getElementById('sig-modal').style.display = 'flex'; resizeCanvas(); }
    function closeSig() { document.getElementById('sig-modal').style.display = 'none'; }
    function clearSig() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function resizeCanvas() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }

    function getPos(e) {
        let rect = canvas.getBoundingClientRect();
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - rect.left, y: clientY - rect.top };
    }

    function startDraw(e) { drawing = true; draw(e); }
    function stopDraw() { drawing = false; ctx.beginPath(); }
    function draw(e) {
        if (!drawing) return;
        e.preventDefault();
        let pos = getPos(e);
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
    }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('touchstart', startDraw);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', stopDraw);

    function saveSig() {
        document.getElementById('sig-display').innerHTML = `<img src="${canvas.toDataURL()}" style="height:100%">`;
        closeSig();
    }

    function saveAll() {
        const data = { name: document.getElementById('userName').value, start: document.getElementById('dateStart').value, rows: [] };
        for(let i=0; i<14; i++){
            for(let r=0; r<3; r++){
                data.rows.push({
                    s: document.getElementById(`s-${i}-${r}`).value,
                    f: document.getElementById(`f-${i}-${r}`).value,
                    b: document.getElementById(`b-${i}-${r}`).checked,
                    site: document.getElementById(`site-${i}-${r}`).value
                });
            }
        }
        localStorage.setItem('jp_dtr_v2', JSON.stringify(data));
    }

    function loadAll() {
        const saved = localStorage.getItem('jp_dtr_v2');
        if (saved) {
            const data = JSON.parse(saved);
            document.getElementById('userName').value = data.name;
            let idx = 0;
            for(let i=0; i<14; i++){
                for(let r=0; r<3; r++){
                    if(data.rows[idx]){
                        document.getElementById(`s-${i}-${r}`).value = data.rows[idx].s;
                        document.getElementById(`f-${i}-${r}`).value = data.rows[idx].f;
                        document.getElementById(`b-${i}-${r}`).checked = data.rows[idx].b;
                        document.getElementById(`site-${i}-${r}`).value = data.rows[idx].site;
                    }
                    idx++;
                }
            }
        }
    }

    updateTable();
</script>

</body>
</html>
