<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JP Interiors - Professional DTR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background: #444; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .controls { width: 100%; max-width: 850px; background: #222; padding: 15px; border-radius: 10px; margin-bottom: 15px; text-align: center; }
        .btn-main { background: #28a745; color: white; padding: 12px 25px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        #timesheet { background: white; width: 210mm; padding: 12mm; box-sizing: border-box; box-shadow: 0 0 20px rgba(0,0,0,0.5); position: relative; }
        
        /* Watermark */
        #timesheet::before {
            content: "JP INTERIORS\a LIMITED"; white-space: pre; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg); font-size: 80px; color: rgba(0, 0, 0, 0.03);
            font-weight: 900; text-align: center; z-index: 0; pointer-events: none; width: 100%;
        }

        .header-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; position: relative; z-index: 1; }
        .input-row { border-bottom: 1px solid #000; margin-bottom: 10px; display: flex; font-size: 13px; }
        .input-row label { font-weight: bold; width: 120px; }
        select, input { border: none; outline: none; background: transparent; font-size: 13px; flex: 1; }

        table { width: 100%; border-collapse: collapse; font-size: 10px; position: relative; z-index: 1; }
        th { background: #f0f0f0; border: 1px solid #999; padding: 5px; text-transform: uppercase; }
        td { border: 1px solid #999; padding: 2px; text-align: center; height: 22px; }
        
        .date-col { background: #f9f9f9; font-weight: bold; width: 90px; text-align: left; padding-left: 5px; }
        .sunday-row { color: red; }
        .week-gap { height: 15px; background: #525659; border: none; }
        
        select.t-select { width: 100%; border: none; appearance: none; text-align: center; font-size: 10px; cursor: pointer; }
        .site-input { width: 100%; border: none; font-size: 10px; outline: none; }
        .site-container { position: relative; }
        .sugg { position: absolute; background: white; border: 1px solid #ddd; width: 100%; z-index: 100; display: none; text-align: left; }
        .s-item { padding: 5px; cursor: pointer; border-bottom: 1px solid #eee; }

        .footer-sig { margin-top: 40px; display: flex; justify-content: space-between; position: relative; z-index: 1; }
        .sig-box { text-align: center; width: 180px; }
        .sig-display { width: 100px; height: 40px; cursor: pointer; border-bottom: 1px solid #000; object-fit: contain; }

        #sigModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-box { background: white; padding: 20px; border-radius: 10px; width: 350px; text-align: center; }
        canvas { border: 1px solid #000; width: 100%; height: 150px; touch-action: none; }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn-main" onclick="printPDF()">📄 Print / Save as PDF</button>
    </div>

    <div id="timesheet">
        <div class="header-section">
            <div>
                <div class="input-row"><label>NAME:</label>
                    <select id="userName">
                        <option>Franklin Nesperos</option>
                        <option>Elmer Cabaña</option>
                        <option>Larry Labrador</option>
                    </select>
                </div>
                <div class="input-row"><label>POSITION:</label><input type="text" value="Plasterer"></div>
            </div>
            <div>
                <div class="input-row"><label>PERIOD ENDING:</label><input type="date" id="period" onchange="updateDates()"></div>
                <div class="input-row"><label>DATE:</label><input type="text" id="dateIssued"></div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>DAY AND DATE</th>
                    <th>START</th>
                    <th>FINISH</th>
                    <th>TOTAL HOURS</th>
                    <th>SITE / COMMENTS</th>
                </tr>
            </thead>
            <tbody id="sheet"></tbody>
            <tfoot>
                <tr style="font-weight:bold; background:#eee;">
                    <td colspan="3" style="text-align:right; padding-right:10px;">GRAND TOTAL (14 DAYS)</td>
                    <td id="grandTotal">0.0</td>
                    <td></td>
                </tr>
            </tfoot>
        </table>

        <div class="footer-sig">
            <div class="sig-box">
                <img id="sigDisplay" class="sig-display" onclick="openSig()">
                <p style="font-size:11px; font-weight:bold;">Employee Signature</p>
            </div>
            <div class="sig-box">
                <div style="height:40px; border-bottom:1px solid #000;"></div>
                <p style="font-size:11px; font-weight:bold;">Manager Signature</p>
            </div>
        </div>
    </div>

    <div id="sigModal">
        <div class="modal-box">
            <h3>Digital Signature</h3>
            <canvas id="canvas"></canvas>
            <div style="margin-top:10px; display:flex; gap:10px;">
                <button onclick="clearSig()" style="flex:1; padding:8px;">Clear</button>
                <button onclick="saveSig()" style="flex:1; padding:8px; background:green; color:white;">Save</button>
            </div>
        </div>
    </div>

<script>
    const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
    
    function generateTimes() {
        const t = [""];
        for(let h=0; h<24; h++) {
            for(let m=0; m<60; m+=15) {
                let hh = h % 12 || 12;
                let mm = m.toString().padStart(2, '0');
                let ampm = h < 12 ? "AM" : "PM";
                t.push(`${hh}:${mm} ${ampm}`);
            }
        }
        return t;
    }
    const timesList = generateTimes();

    function buildTable() {
        const body = document.getElementById('sheet');
        document.getElementById('dateIssued').value = new Date().toLocaleDateString('en-GB');
        
        for (let w = 0; w < 2; w++) {
            days.forEach((day, dIdx) => {
                const globalDayIdx = (w * 7) + dIdx;
                for (let layer = 0; layer < 3; layer++) {
                    const row = document.createElement('tr');
                    const isSun = (day === "Sunday");
                    
                    // Default values para sa Layer 1 (except Sunday)
                    const defStart = (!isSun && layer === 0) ? "7:00 AM" : "";
                    const defFinish = (!isSun && layer === 0) ? "5:00 PM" : "";
                    const defTotal = (!isSun && layer === 0) ? "9.5" : "0.0";

                    row.innerHTML = `
                        ${layer === 0 ? `<td class="date-col ${isSun?'sunday-row':''}" rowspan="3" id="date-${globalDayIdx}">${20+globalDayIdx} ${day}</td>` : ''}
                        <td><select class="t-select t-start" onchange="calc(this)">${timesList.map(t => `<option ${t==defStart?'selected':''}>${t}</option>`).join('')}</select></td>
                        <td><select class="t-select t-end" onchange="calc(this)">${timesList.map(t => `<option ${t==defFinish?'selected':''}>${t}</option>`).join('')}</select></td>
                        <td class="row-total" style="font-weight:bold">${defTotal}</td>
                        <td class="site-container"><input type="text" class="site-input" oninput="findSite(this)"><div class="sugg"></div></td>
                    `;
                    body.appendChild(row);
                }
            });
            if(w === 0) {
                const gap = document.createElement('tr');
                gap.innerHTML = `<td colspan="5" class="week-gap"></td>`;
                body.appendChild(gap);
            }
        }
        updateGrand();
    }

    function calc(el) {
        const row = el.closest('tr');
        const sVal = row.querySelector('.t-start').value;
        const eVal = row.querySelector('.t-end').value;
        let total = 0;
        if(sVal && eVal) {
            const s = new Date("1970/01/01 " + sVal);
            const e = new Date("1970/01/01 " + eVal);
            let diff = (e - s) / (1000 * 60 * 60);
            if(diff < 0) diff += 24;
            if(diff >= 5) diff -= 0.5; // Lunch break
            total = diff > 0 ? diff : 0;
        }
        row.querySelector('.row-total').textContent = total.toFixed(2).replace('.00', '.0');
        updateGrand();
    }

    function updateGrand() {
        let sum = 0;
        document.querySelectorAll('.row-total').forEach(td => sum += parseFloat(td.textContent));
        document.getElementById('grandTotal').textContent = sum.toFixed(2);
    }

    function updateDates() {
        const periodVal = document.getElementById('period').value;
        if(!periodVal) return;
        const endDate = new Date(periodVal);
        for(let i=13; i>=0; i--) {
            let d = new Date(endDate);
            d.setDate(d.getDate() - i);
            const target = document.getElementById(`date-${13-i}`);
            if(target) target.innerHTML = `${d.getDate()} ${days[d.getDay() === 0 ? 6 : d.getDay() - 1]}`;
        }
    }

    async function findSite(inp) {
        const box = inp.nextElementSibling;
        if(inp.value.length < 3) { box.style.display='none'; return; }
        const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${inp.value},+Hamilton,+NZ&limit=3`);
        const data = await r.json();
        box.innerHTML = "";
        if(data.length > 0) {
            box.style.display='block';
            data.forEach(d => {
                const item = document.createElement('div'); item.className='s-item';
                item.textContent = d.display_name.split(', New Zealand')[0];
                item.onclick = () => { inp.value = item.textContent; box.style.display='none'; };
                box.appendChild(item);
            });
        }
    }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    function openSig() { document.getElementById('sigModal').style.display='flex'; canvas.width = canvas.offsetWidth; ctx.lineWidth=2; }
    function clearSig() { ctx.clearRect(0,0,canvas.width,canvas.height); }
    function saveSig() {
        document.getElementById('sigDisplay').src = canvas.toDataURL();
        document.getElementById('sigModal').style.display='none';
    }
    canvas.addEventListener('touchstart', e => { drawing=true; const r=canvas.getBoundingClientRect(); ctx.beginPath(); ctx.moveTo(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top); e.preventDefault(); });
    canvas.addEventListener('touchmove', e => { if(!drawing) return; const r=canvas.getBoundingClientRect(); ctx.lineTo(e.touches[0].clientX-r.left, e.touches[0].clientY-r.top); ctx.stroke(); });
    canvas.addEventListener('touchend', () => drawing=false);

    function printPDF() {
        const element = document.getElementById('timesheet');
        html2pdf().from(element).set({ margin: 5, filename: 'JP_Interiors_DTR.pdf', html2canvas: { scale: 3 }, jsPDF: { unit: 'mm', format: 'a4' }}).save();
    }

    buildTable();
</script>
</body>
</html>
