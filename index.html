<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frank S25 Ultra Project</title>
    <style>
        body { background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: "Segoe UI", sans-serif; overflow: hidden; touch-action: none; }
        .phone-frame { width: 360px; height: 740px; background: #000; border: 4px solid #333; border-radius: 35px; position: relative; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .camera-hole { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 12px; height: 12px; background: #0a0a0a; border-radius: 50%; z-index: 5000; }
        .screen { width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000'); background-size: cover; background-position: center; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; position: relative; }
        
        /* Status Bar */
        .status-bar { width: 100%; display: flex; justify-content: space-between; padding: 12px 20px; color: white; font-size: 13px; font-weight: 600; z-index: 500; position: absolute; top: 0; box-sizing: border-box; }
        
        /* Home Screen Clock */
        .main-clock { margin-top: 60px; color: white; text-align: center; width: 100%; cursor: pointer; z-index: 10; }
        #big-time { font-size: 72px; font-weight: 200; margin: 0; }
        #big-date { font-size: 16px; margin-top: -5px; opacity: 0.9; }

        /* App Grid */
        .app-grid { width: 100%; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: auto; margin-bottom: 50px; z-index: 10; }
        .app-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .icon { width: 58px; height: 58px; border-radius: 18px; display: flex; justify-content: center; align-items: center; font-size: 30px; margin-bottom: 6px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.1s; }
        .app-item:active .icon { transform: scale(0.9); }
        .label { color: white; font-size: 11px; text-shadow: 1px 1px 3px #000; text-align: center; }

        /* ALL APPS CONTAINER */
        .app-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f4f4f4; z-index: 4000; display: none; flex-direction: column; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .app-header { background: white; padding: 45px 20px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; color: #333; font-weight: bold; }
        .close-btn { cursor: pointer; font-size: 24px; padding: 5px; color: #666; }

        /* TAPO STYLE */
        .tapo-content { padding: 10px; flex: 1; overflow-y: auto; background: #f4f4f4; }
        .live-cam { width: 100%; height: 180px; background: #000; border-radius: 12px; margin-bottom: 15px; position: relative; overflow: hidden; }
        .live-cam video { width: 100%; height: 100%; object-fit: cover; }
        .live-tag { position: absolute; top: 10px; left: 10px; background: red; color: white; padding: 2px 5px; border-radius: 3px; font-size: 9px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* HOUSE PLANNER STYLE */
        #plannerCanvas { background: #fff; display: block; touch-action: none; cursor: crosshair; }
        .planner-tools { background: #333; padding: 10px; display: flex; gap: 5px; justify-content: center; }
        .p-btn { background: #555; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 11px; }
        .p-btn.active { background: #00a0e9; }
        .area-stat { position: absolute; bottom: 70px; left: 20px; background: rgba(0,0,0,0.7); color: white; padding: 5px; border-radius: 5px; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="camera-hole"></div>
    <div class="status-bar">
        <span id="status-time">00:00</span>
        <div>100% 🔋</div>
    </div>

    <div class="screen">
        <div class="main-clock">
            <h1 id="big-time">00:00</h1>
            <p id="big-date">Loading...</p>
        </div>

        <div class="app-grid">
            <div class="app-item" onclick="openApp('planner')">
                <div class="icon" style="background: #34495e;">📐</div>
                <span class="label">Planner</span>
            </div>
            <div class="app-item" onclick="openApp('tapo')">
                <div class="icon" style="background: #00a0e9;">📹</div>
                <span class="label">Tapo</span>
            </div>
            <div class="app-item" onclick="window.location.href='solar-app.html'">
                <div class="icon" style="background: linear-gradient(135deg, #FF8C00, #FFD700);">☀️</div>
                <span class="label">Solar</span>
            </div>
            <div class="app-item" onclick="window.location.href='dtr-app.html'">
                <div class="icon" style="background: white;">📅</div>
                <span class="label">DTR</span>
            </div>
        </div>
    </div>

    <div id="tapoOverlay" class="app-overlay">
        <div class="app-header" style="color:#00a0e9;">
            <span>Tapo Live Feed</span>
            <span class="close-btn" onclick="closeApps()">✕</span>
        </div>
        <div class="tapo-content">
            <div class="live-cam">
                <div class="live-tag">● LIVE</div>
                <video autoplay muted loop playsinline><source src="https://assets.mixkit.co/videos/preview/mixkit-security-camera-view-of-a-street-at-night-34440-large.mp4"></video>
            </div>
            <div class="live-cam">
                <div class="live-tag">● LIVE</div>
                <video autoplay muted loop playsinline><source src="https://assets.mixkit.co/videos/preview/mixkit-cctv-camera-of-a-room-with-people-34442-large.mp4"></video>
            </div>
        </div>
    </div>

    <div id="plannerOverlay" class="app-overlay" style="background:#fff;">
        <div class="app-header">
            <span>House Planner</span>
            <span class="close-btn" onclick="closeApps()">✕</span>
        </div>
        <div class="planner-tools">
            <button class="p-btn active" id="drawMode" onclick="setPlannerMode('draw')">✏️ Draw</button>
            <button class="p-btn" id="deleteMode" onclick="setPlannerMode('delete')">🗑️ Del</button>
            <button class="p-btn" onclick="clearPlanner()">🧹 Reset</button>
        </div>
        <canvas id="plannerCanvas"></canvas>
        <div class="area-stat" id="areaDisplay">Area: 0 sqm</div>
    </div>

</div>

<script>
    // 1. NAVIGATION & CLOCK
    function updateClock() {
        const now = new Date();
        const time = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        document.getElementById('status-time').textContent = time;
        document.getElementById('big-time').textContent = time;
        document.getElementById('big-date').textContent = now.toLocaleDateString('en-PH', { weekday: 'long', month: 'long', day: 'numeric' });
    }
    setInterval(updateClock, 1000); updateClock();

    function openApp(id) {
        closeApps();
        if(id === 'tapo') document.getElementById('tapoOverlay').style.display = 'flex';
        if(id === 'planner') {
            document.getElementById('plannerOverlay').style.display = 'flex';
            resizeCanvas();
        }
    }
    function closeApps() {
        document.getElementById('tapoOverlay').style.display = 'none';
        document.getElementById('plannerOverlay').style.display = 'none';
    }

    // 2. HOUSE PLANNER LOGIC
    const canvas = document.getElementById('plannerCanvas');
    const ctx = canvas.getContext('2d');
    let walls = [], isDrawing = false, startP = null, pMode = 'draw';

    function resizeCanvas() {
        canvas.width = 360; canvas.height = 550;
        drawPlanner();
    }

    function setPlannerMode(m) {
        pMode = m;
        document.getElementById('drawMode').classList.toggle('active', m==='draw');
        document.getElementById('deleteMode').classList.toggle('active', m==='delete');
    }

    canvas.addEventListener('touchstart', (e) => {
        const r = canvas.getBoundingClientRect();
        const x = e.touches[0].clientX - r.left, y = e.touches[0].clientY - r.top;
        if(pMode === 'draw') { isDrawing = true; startP = {x, y}; }
        else { deleteWall(x, y); }
    });

    canvas.addEventListener('touchmove', (e) => {
        if(!isDrawing) return;
        const r = canvas.getBoundingClientRect();
        drawPlanner(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top);
    });

    canvas.addEventListener('touchend', (e) => {
        if(!isDrawing) return;
        const r = canvas.getBoundingClientRect();
        const x = e.changedTouches[0].clientX - r.left, y = e.changedTouches[0].clientY - r.top;
        walls.push({x1: startP.x, y1: startP.y, x2: x, y2: y});
        isDrawing = false; drawPlanner(); calculateSqm();
    });

    function deleteWall(x, y) {
        walls = walls.filter(w => {
            const d = Math.abs((w.y2-w.y1)*x - (w.x2-w.x1)*y + w.x2*w.y1 - w.y2*w.x1) / Math.sqrt(Math.pow(w.y2-w.y1,2) + Math.pow(w.x2-w.x1,2));
            return d > 15;
        });
        drawPlanner(); calculateSqm();
    }

    function drawPlanner(tx, ty) {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        // Grid
        ctx.strokeStyle = "#eee"; ctx.lineWidth = 1;
        for(let i=0; i<canvas.width; i+=20) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
        for(let i=0; i<canvas.height; i+=20) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }
        
        // Walls
        ctx.strokeStyle = "#333"; ctx.lineWidth = 4;
        walls.forEach(w => {
            ctx.beginPath(); ctx.moveTo(w.x1, w.y1); ctx.lineTo(w.x2, w.y2); ctx.stroke();
            const m = Math.sqrt(Math.pow(w.x2-w.x1,2)+Math.pow(w.y2-w.y1,2))/20;
            ctx.fillStyle = "blue"; ctx.font = "10px Arial";
            ctx.fillText(m.toFixed(1)+"m", (w.x1+w.x2)/2, (w.y1+w.y2)/2 - 5);
        });

        if(isDrawing) {
            ctx.strokeStyle = "#00a0e9"; ctx.beginPath(); ctx.moveTo(startP.x, startP.y); ctx.lineTo(tx, ty); ctx.stroke();
        }
    }

    function calculateSqm() {
        if(walls.length < 2) return;
        let xs = walls.flatMap(w => [w.x1, w.x2]), ys = walls.flatMap(w => [w.y1, w.y2]);
        let w = (Math.max(...xs) - Math.min(...xs))/20, h = (Math.max(...ys) - Math.min(...ys))/20;
        document.getElementById('areaDisplay').innerText = "Est. Area: " + (w*h).toFixed(2) + " sqm";
    }

    function clearPlanner() { if(confirm("Clear all?")) { walls = []; drawPlanner(); calculateSqm(); } }
</script>

</body>
</html>
